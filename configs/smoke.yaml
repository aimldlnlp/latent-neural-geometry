seed: 7

output:
  run_name: smoke_run

data:
  n_train_sequences: 10
  n_test_sequences: 4
  sequence_length: 80
  n_neurons: 48
  dt: 0.05
  noise_std: 0.18
  spike_scale: 12.0
  angle_velocity_range: [0.7, 1.3]
  contrast_base_range: [0.35, 0.7]
  contrast_amplitude_range: [0.12, 0.24]
  smoothing_sigma: 0.8

model:
  hidden_dim: 32
  latent_dim: 3
  epochs: 50
  batch_size: 128
  learning_rate: 0.0035
  weight_decay: 0.00001
  input_noise_std: 0.03
  validation_fraction: 0.15
  early_stopping_patience: 10

eval:
  trustworthiness_k: 10
  trustworthiness_subset: 250
  dropout_fractions: [0.0, 0.2, 0.4]
  ridge_penalty: 0.001

visuals:
  dpi: 180
  animation_fps: 12
  animation_sequence_index: 0

